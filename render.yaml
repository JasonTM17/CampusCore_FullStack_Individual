services:
  - name: campuscore-backend
    runtime: node
    type: web
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: campuscore-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: campuscore-redis
          type: redis
          property: connectionString
      - key: RABBITMQ_URL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: 9000
      - key: MINIO_BUCKET
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: PORT
        value: 4000

  - name: campuscore-redis
    runtime: redis
    type: redis
    plan: free
    region: oregon

databases:
  - name: campuscore-db
    plan: free
    region: oregon
    databaseName: campuscore
