services:
  - name: campuscore-backend
    runtime: node
    type: web
    plan: free
    region: oregon
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: campuscore-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: campuscore-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: PORT
        value: 3000

  - name: campuscore-redis
    runtime: redis
    type: redis
    plan: free
    region: oregon

databases:
  - name: campuscore-db
    plan: free
    region: oregon
    databaseName: campuscore
