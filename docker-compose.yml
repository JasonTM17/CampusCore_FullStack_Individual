services:
  postgres:
    image: postgres:15-alpine
    container_name: campuscore-db
    environment:
      POSTGRES_USER: campuscore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campuscore_password}
      POSTGRES_DB: campuscore
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campuscore -d campuscore"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: campuscore-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: campuscore-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-campuscore}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-campuscore_password}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: campuscore-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-campuscore}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-campuscore_password}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  core-api-init:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: build
    working_dir: /app
    command: sh -lc "npx prisma db push --skip-generate && npm run prisma:seed"
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:-campuscore_password}@postgres:5432/campuscore?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  core-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: campuscore-backend:local
    container_name: campuscore-api
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:-campuscore_password}@postgres:5432/campuscore
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-rotate-before-shared-use}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-rotate-before-shared-use}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:-local-dev-readiness-key-12345}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-12345}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:-campuscore_password}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_BUCKET: campuscore
      MINIO_ACCESS_KEY: ${MINIO_USER:-campuscore}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-campuscore_password}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      LOG_LEVEL: info
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831
      FRONTEND_URL: http://localhost
      PORT: 4000
      NODE_ENV: production
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      core-api-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --header=\"X-Health-Key: ${HEALTH_READINESS_KEY:-local-dev-readiness-key-12345}\" -O- http://localhost:4000/api/v1/health/readiness >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  notification-service-init:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
      target: build
    working_dir: /app
    command: sh -lc "npx prisma db push --skip-generate && npm run data:migrate:legacy"
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:-campuscore_password}@postgres:5432/campuscore?schema=notifications
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-rotate-before-shared-use}
      FRONTEND_URL: http://localhost
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:-local-dev-readiness-key-12345}
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:-campuscore_password}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core-api-init:
        condition: service_completed_successfully
    restart: "no"

  finance-service-init:
    build:
      context: .
      dockerfile: finance-service/Dockerfile
      target: build
    working_dir: /app
    command: sh -lc "npx prisma db push --skip-generate && npm run data:migrate:legacy"
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:-campuscore_password}@postgres:5432/campuscore?schema=finance
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-12345}
      CORE_API_INTERNAL_URL: http://core-api:4000
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-rotate-before-shared-use}
      FRONTEND_URL: http://localhost
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:-local-dev-readiness-key-12345}
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:-campuscore_password}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core-api-init:
        condition: service_completed_successfully
      core-api:
        condition: service_healthy
    restart: "no"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: campuscore-notification-service:local
    container_name: campuscore-notification-service
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:-campuscore_password}@postgres:5432/campuscore?schema=notifications
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-rotate-before-shared-use}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:-local-dev-readiness-key-12345}
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:-campuscore_password}@rabbitmq:5672
      FRONTEND_URL: http://localhost
      PORT: 4001
      NODE_ENV: production
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      notification-service-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --header=\"X-Health-Key: ${HEALTH_READINESS_KEY:-local-dev-readiness-key-12345}\" -O- http://localhost:4001/api/v1/health/readiness >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  finance-service:
    build:
      context: .
      dockerfile: finance-service/Dockerfile
    image: campuscore-finance-service:local
    container_name: campuscore-finance-service
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:-campuscore_password}@postgres:5432/campuscore?schema=finance
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-rotate-before-shared-use}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:-local-dev-readiness-key-12345}
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:-campuscore_password}@rabbitmq:5672
      FRONTEND_URL: http://localhost
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-12345}
      CORE_API_INTERNAL_URL: http://core-api:4000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      PORT: 4002
      NODE_ENV: production
    ports:
      - "127.0.0.1:4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      finance-service-init:
        condition: service_completed_successfully
      core-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --header=\"X-Health-Key: ${HEALTH_READINESS_KEY:-local-dev-readiness-key-12345}\" -O- http://localhost:4002/api/v1/health/readiness >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: campuscore-frontend:local
    container_name: campuscore-web
    environment:
      NODE_ENV: production
    depends_on:
      core-api:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: campuscore-nginx
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      core-api:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: campuscore-mailhog
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: campuscore-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: campuscore-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-local-dev-grafana-password-change-me}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: campuscore-loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: campuscore-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail.yml:ro
      - nginx_logs:/var/log/nginx:ro
    depends_on:
      - loki
      - nginx
    command:
      - -config.file=/etc/promtail/promtail.yml
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: campuscore-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
      SPAN_STORAGE_TYPE: badger
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:6831:6831/udp"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - jaeger_data:/badger
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  jaeger_data:
  nginx_logs:

networks:
  default:
    name: campuscore-network
