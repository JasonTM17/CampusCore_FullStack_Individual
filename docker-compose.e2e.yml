services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: campuscore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campuscore_password}
      POSTGRES_DB: campuscore_e2e
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campuscore -d campuscore_e2e"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-campuscore}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-campuscore_password}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-campuscore}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-campuscore_password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_e2e_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -lc
      - |
        until mc alias set campuscore http://minio:9000 "$${MINIO_USER}" "$${MINIO_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "campuscore/$${MINIO_BUCKET}"
        mc ls "campuscore/$${MINIO_BUCKET}"
    environment:
      MINIO_USER: ${MINIO_USER:-campuscore}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-campuscore_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-campuscore}
    restart: "no"

  backend-init:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: build
    working_dir: /app
    command: sh -lc "npx prisma db push --skip-generate && npm run prisma:seed"
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:-campuscore_password}@postgres:5432/campuscore_e2e?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:-campuscore_password}@postgres:5432/campuscore_e2e?schema=public
      JWT_SECRET: ${JWT_SECRET:-edge-e2e-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-edge-e2e-refresh-secret}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:-campuscore_password}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_BUCKET: campuscore
      MINIO_ACCESS_KEY: ${MINIO_USER:-campuscore}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-campuscore_password}
      FRONTEND_URL: ${E2E_FRONTEND_URL:-http://127.0.0.1}
      PORT: 4000
      NODE_ENV: production
    depends_on:
      backend-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${E2E_EDGE_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_e2e_data:
  minio_e2e_data:
