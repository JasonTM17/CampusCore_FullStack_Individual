server:
  http_listen_port: 9080
  grpc_listen_port: 9081

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-logs
          __path__: /var/log/nginx/*.log

  - job_name: backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: backend-logs
          __path__: /var/log/backend/*.log

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-logs
          __path__: /var/log/*.log
