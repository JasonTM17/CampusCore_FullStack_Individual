groups:
  - name: campuscore-service-health
    rules:
      - alert: CampusCoreServiceDown
        expr: campuscore_service_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: CampusCore service is down
          description: '{{ $labels.service }} is reporting service_up=0.'

      - alert: CampusCoreDependencyDown
        expr: campuscore_dependency_up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: CampusCore dependency is down
          description: '{{ $labels.service }} cannot reach {{ $labels.dependency }}.'

      - alert: CampusCoreDependencyLatencyHigh
        expr: campuscore_dependency_latency_ms > 750
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: CampusCore dependency latency is elevated
          description: '{{ $labels.service }} reports {{ $labels.dependency }} latency above 750ms.'

      - alert: CampusCoreRegistrationPressureHigh
        expr: sum(campuscore_section_pressure_total{bucket=~"full|near_capacity"}) > 8
        for: 10m
        labels:
          severity: warning
          domain: academic
        annotations:
          summary: Registration pressure is high
          description: 'Multiple sections are full or near capacity. Review waitlists and section capacity.'

      - alert: CampusCorePaymentFailuresDetected
        expr: sum(campuscore_payment_status_total{status="FAILED"}) > 0
        for: 5m
        labels:
          severity: warning
          domain: finance
        annotations:
          summary: Payment failures require review
          description: 'Finance telemetry reports failed payments. Check provider callbacks and reconciliation.'

      - alert: CampusCoreOverdueInvoiceBacklog
        expr: sum(campuscore_invoice_status_total{status="OVERDUE"}) > 0
        for: 15m
        labels:
          severity: warning
          domain: finance
        annotations:
          summary: Overdue invoice backlog is present
          description: 'One or more invoices are overdue. Review student billing follow-up.'

      - alert: CampusCoreNotificationWarnings
        expr: sum(campuscore_notification_delivery_total{type=~"WARNING|ERROR"}) > 0
        for: 10m
        labels:
          severity: info
          domain: notification
        annotations:
          summary: Notification delivery attention needed
          description: 'Warning or error notifications are present in the operator feed.'

      - alert: CampusCoreAverageOccupancyHigh
        expr: campuscore_section_average_occupancy_ratio > 0.85
        for: 10m
        labels:
          severity: warning
          domain: academic
        annotations:
          summary: Average section occupancy is elevated
          description: 'Average section occupancy is above 85%. Capacity planning may be needed.'
