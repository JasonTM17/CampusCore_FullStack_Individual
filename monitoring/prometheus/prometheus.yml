global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: core-api
    metrics_path: /api/v1/health/metrics
    static_configs:
      - targets: ["core-api:4000"]
    http_headers:
      X-Health-Key:
        values: ["local-dev-readiness-key-12345"]

  - job_name: auth-service
    metrics_path: /api/v1/health/metrics
    static_configs:
      - targets: ["auth-service:4007"]
    http_headers:
      X-Health-Key:
        values: ["local-dev-readiness-key-12345"]

  - job_name: notification-service
    metrics_path: /api/v1/health/metrics
    static_configs:
      - targets: ["notification-service:4001"]
    http_headers:
      X-Health-Key:
        values: ["local-dev-readiness-key-12345"]

  - job_name: finance-service
