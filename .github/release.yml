changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
        - feat
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Tests and CI
      labels:
        - test
        - tests
        - ci
    - title: Maintenance
      labels:
        - chore
        - maintenance
    - title: Other Changes
      labels:
        - '*'
