name: CD - Docker Hub Publish

on:
  push:
    branches: [master, main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish'
        required: false
        default: 'latest'

env:
  BACKEND_IMAGE: campuscore-backend
  FRONTEND_IMAGE: campuscore-frontend

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-hub-check:
    name: Check Docker Hub credentials
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')))
    outputs:
      image_tag: ${{ steps.gate.outputs.image_tag }}
      namespace: ${{ steps.gate.outputs.namespace }}
      should_publish: ${{ steps.gate.outputs.should_publish }}
    steps:
      - name: Evaluate Docker Hub settings
        id: gate
        env:
          DH_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          DH_PASS: ${{ secrets.DOCKERHUB_PASSWORD }}
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
        run: |
          namespace="${DH_NAMESPACE:-$DH_USER}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            image_tag="${REQUESTED_TAG:-latest}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            image_tag="${GITHUB_REF_NAME}"
          else
            image_tag="latest"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "namespace=${namespace}" >> "$GITHUB_OUTPUT"

          if [ -n "$DH_USER" ] && [ -n "$DH_PASS" ] && [ -n "$namespace" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Docker Hub publish skipped::Add DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD secrets. Optional DOCKERHUB_NAMESPACE can target an organization; when omitted, DOCKERHUB_USERNAME is used as the legacy namespace alias."
          fi

  publish:
    name: Publish images to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-hub-check
    if: needs.docker-hub-check.outputs.should_publish == 'true'
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.docker-hub-check.outputs.namespace }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.docker-hub-check.outputs.image_tag }}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.title=CampusCore Backend API
            org.opencontainers.image.description=CampusCore NestJS API with JWT auth, Prisma, PostgreSQL, Redis, RabbitMQ, MinIO, health checks, and Swagger docs.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.docker-hub-check.outputs.namespace }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.docker-hub-check.outputs.image_tag }}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.title=CampusCore Frontend Web
            org.opencontainers.image.description=CampusCore Next.js 15 standalone frontend for the nginx-backed academic management stack.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Summary
        run: |
          {
            echo "## Docker Hub publish"
            echo ""
            echo "- Namespace: ${{ needs.docker-hub-check.outputs.namespace }}"
            echo "- Tag: ${{ needs.docker-hub-check.outputs.image_tag }}"
            echo "- Backend: ${{ needs.docker-hub-check.outputs.namespace }}/${{ env.BACKEND_IMAGE }}:${{ needs.docker-hub-check.outputs.image_tag }}"
            echo "- Frontend: ${{ needs.docker-hub-check.outputs.namespace }}/${{ env.FRONTEND_IMAGE }}:${{ needs.docker-hub-check.outputs.image_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"
