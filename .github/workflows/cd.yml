name: CD - Gated Registry Publish

on:
  push:
    tags:
      - 'v*.*.*'

env:
  BACKEND_IMAGE: campuscore-backend
  AUTH_IMAGE: campuscore-auth-service
  NOTIFICATION_IMAGE: campuscore-notification-service
  FINANCE_IMAGE: campuscore-finance-service
  ACADEMIC_IMAGE: campuscore-academic-service
  ENGAGEMENT_IMAGE: campuscore-engagement-service
  PEOPLE_IMAGE: campuscore-people-service
  ANALYTICS_IMAGE: campuscore-analytics-service
  FRONTEND_IMAGE: campuscore-frontend

permissions:
  contents: read
  actions: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plan:
    name: Resolve image publish plan
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.gate.outputs.image_tag }}
      short_sha: ${{ steps.gate.outputs.short_sha }}
      source_sha: ${{ steps.gate.outputs.source_sha }}
      dockerhub_namespace: ${{ steps.gate.outputs.dockerhub_namespace }}
      ghcr_namespace: ${{ steps.gate.outputs.ghcr_namespace }}
      should_publish_dockerhub: ${{ steps.gate.outputs.should_publish_dockerhub }}
    steps:
      - name: Evaluate registry settings
        id: gate
        env:
          DH_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          DH_PASS: ${{ secrets.DOCKERHUB_PASSWORD }}
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          GH_OWNER: ${{ github.repository_owner }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          dockerhub_namespace="${DH_NAMESPACE:-$DH_USER}"
          ghcr_namespace="$(printf '%s' "${GH_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(printf '%s' "${SOURCE_SHA}" | cut -c1-7)"
          image_tag="${GITHUB_REF_NAME}"

          if [ -n "$DH_USER" ] && [ -n "$DH_PASS" ] && [ -n "$dockerhub_namespace" ]; then
            should_publish_dockerhub=true
          else
            should_publish_dockerhub=false
            echo "::notice title=Docker Hub publish skipped::Add DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD secrets. DOCKERHUB_NAMESPACE is preferred; when omitted, DOCKERHUB_USERNAME remains the legacy namespace alias."
          fi

          {
            echo "image_tag=${image_tag}"
            echo "short_sha=${short_sha}"
            echo "source_sha=${SOURCE_SHA}"
            echo "dockerhub_namespace=${dockerhub_namespace}"
            echo "ghcr_namespace=${ghcr_namespace}"
            echo "should_publish_dockerhub=${should_publish_dockerhub}"
          } >> "$GITHUB_OUTPUT"

  wait-for-quality-gate:
    name: Wait for CI quality gate
    runs-on: ubuntu-latest
    needs: release-plan
    outputs:
      ci_run_id: ${{ steps.wait-ci.outputs.ci_run_id }}
      ci_run_url: ${{ steps.wait-ci.outputs.ci_run_url }}
    steps:
      - name: Wait for matching CI success
        id: wait-ci
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const workflowId = 'ci.yml';
            const timeoutMs = 90 * 60 * 1000;
            const intervalMs = 30 * 1000;
            const startedAt = Date.now();
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const tagName = context.ref.replace('refs/tags/', '');

            const currentRun = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
            });

            const currentRunCreatedAt = new Date(currentRun.data.created_at);
            const minCreatedAt = new Date(currentRunCreatedAt.getTime() - 60 * 1000);

            const describeRun = (run) =>
              `id=${run.id} status=${run.status} conclusion=${run.conclusion} created=${run.created_at} event=${run.event} branch=${run.head_branch ?? 'n/a'}`;

            while (Date.now() - startedAt < timeoutMs) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                head_sha: sha,
                per_page: 20,
              });

              let candidates = response.data.workflow_runs.filter(
                (run) =>
                  run.name === 'CI Build and Test' &&
                  run.event === 'push',
              );

              candidates = candidates.filter((run) => new Date(run.created_at) >= minCreatedAt);

              if (candidates.length > 0) {
                candidates.sort(
                  (left, right) =>
                    new Date(right.created_at).getTime() -
                    new Date(left.created_at).getTime(),
                );

                const latest = candidates[0];
                core.info(`Latest matching tag CI run for ${tagName}: ${describeRun(latest)}`);

                if (latest.status === 'completed') {
                  if (latest.conclusion === 'success') {
                    core.setOutput('ci_run_id', String(latest.id));
                    core.setOutput('ci_run_url', latest.html_url);
                    return;
                  }

                  core.setFailed(
                    `CI Build and Test failed for tag ${tagName} on ${sha}. Latest matching run: ${describeRun(latest)}`,
                  );
                  return;
                }
              } else {
                core.info(`No matching CI run found yet for ${sha}. Waiting...`);
              }

              await sleep(intervalMs);
            }

            core.setFailed(
              `Timed out waiting for CI Build and Test to succeed for tag ${tagName} on ${sha}.`,
            );

      - name: Summary
        run: |
          {
            echo "## Release gate"
            echo ""
            echo "- Source SHA: ${{ needs.release-plan.outputs.source_sha }}"
            echo "- CI run: ${{ steps.wait-ci.outputs.ci_run_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-dockerhub:
    name: Publish images to Docker Hub
    runs-on: ubuntu-latest
    needs: [release-plan, wait-for-quality-gate]
    if: needs.release-plan.outputs.should_publish_dockerhub == 'true'
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Backend API
            org.opencontainers.image.description=CampusCore NestJS API with JWT auth, Prisma, PostgreSQL, Redis, RabbitMQ, MinIO, health checks, and Swagger docs.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push backend
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (auth service)
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.AUTH_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Auth Service
            org.opencontainers.image.description=CampusCore auth and IAM service for sessions, users, roles, permissions, JWT cookies, and CSRF protection.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push auth service
        id: build-auth
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./auth-service/Dockerfile
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          labels: ${{ steps.meta-auth.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (notification service)
        id: meta-notification
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.NOTIFICATION_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Notification Service
            org.opencontainers.image.description=CampusCore notification inbox and realtime delivery service powered by NestJS 11, RabbitMQ, and Socket.IO.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push notification service
        id: build-notification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./notification-service/Dockerfile
          push: true
          tags: ${{ steps.meta-notification.outputs.tags }}
          labels: ${{ steps.meta-notification.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Frontend Web
            org.opencontainers.image.description=CampusCore Next.js 15 standalone frontend for the nginx-backed academic management stack.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (engagement service)
        id: meta-engagement
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ENGAGEMENT_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Engagement Service
            org.opencontainers.image.description=CampusCore engagement service for announcements and support ticket ownership.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push engagement service
        id: build-engagement
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./engagement-service/Dockerfile
          push: true
          tags: ${{ steps.meta-engagement.outputs.tags }}
          labels: ${{ steps.meta-engagement.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (people service)
        id: meta-people
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.PEOPLE_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore People Service
            org.opencontainers.image.description=CampusCore people service for student and lecturer ownership with JWT-safe shadow sync events.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push people service
        id: build-people
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./people-service/Dockerfile
          push: true
          tags: ${{ steps.meta-people.outputs.tags }}
          labels: ${{ steps.meta-people.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (finance service)
        id: meta-finance
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FINANCE_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Finance Service
            org.opencontainers.image.description=CampusCore finance service for invoices, payments, scholarships, and billing events.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push finance service
        id: build-finance
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./finance-service/Dockerfile
          push: true
          tags: ${{ steps.meta-finance.outputs.tags }}
          labels: ${{ steps.meta-finance.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (academic service)
        id: meta-academic
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ACADEMIC_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Academic Service
            org.opencontainers.image.description=CampusCore academic service for semesters, courses, sections, enrollment, attendance, and grading ownership.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push academic service
        id: build-academic
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./academic-service/Dockerfile
          push: true
          tags: ${{ steps.meta-academic.outputs.tags }}
          labels: ${{ steps.meta-academic.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (analytics service)
        id: meta-analytics
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ANALYTICS_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Analytics Service
            org.opencontainers.image.description=CampusCore analytics service for operational dashboards, enrollment trends, lecturer reporting, and finance-academic overview APIs.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push analytics service
        id: build-analytics
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./analytics-service/Dockerfile
          push: true
          tags: ${{ steps.meta-analytics.outputs.tags }}
          labels: ${{ steps.meta-analytics.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Summary
        run: |
          {
            echo "## Docker Hub publish"
            echo ""
            echo "- CI gate run: ${{ needs.wait-for-quality-gate.outputs.ci_run_url }}"
            echo "- Source SHA: ${{ needs.release-plan.outputs.source_sha }}"
            echo "- Backend tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.BACKEND_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- Backend SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.BACKEND_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- Backend latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.BACKEND_IMAGE }}:latest"
            echo "- Backend digest: ${{ steps.build-backend.outputs.digest }}"
            echo "- Auth tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.AUTH_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- Auth SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.AUTH_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- Auth latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.AUTH_IMAGE }}:latest"
            echo "- Auth digest: ${{ steps.build-auth.outputs.digest }}"
            echo "- Notification tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.NOTIFICATION_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- Notification SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.NOTIFICATION_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- Notification latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.NOTIFICATION_IMAGE }}:latest"
            echo "- Notification digest: ${{ steps.build-notification.outputs.digest }}"
            echo "- Finance tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FINANCE_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- Finance SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FINANCE_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- Finance latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FINANCE_IMAGE }}:latest"
            echo "- Finance digest: ${{ steps.build-finance.outputs.digest }}"
            echo "- Academic tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ACADEMIC_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- Academic SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ACADEMIC_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- Academic latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ACADEMIC_IMAGE }}:latest"
            echo "- Academic digest: ${{ steps.build-academic.outputs.digest }}"
            echo "- Analytics tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ANALYTICS_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- Analytics SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ANALYTICS_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- Analytics latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ANALYTICS_IMAGE }}:latest"
            echo "- Analytics digest: ${{ steps.build-analytics.outputs.digest }}"
            echo "- Engagement tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ENGAGEMENT_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- Engagement SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ENGAGEMENT_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- Engagement latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ENGAGEMENT_IMAGE }}:latest"
            echo "- Engagement digest: ${{ steps.build-engagement.outputs.digest }}"
            echo "- People tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.PEOPLE_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- People SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.PEOPLE_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- People latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.PEOPLE_IMAGE }}:latest"
            echo "- People digest: ${{ steps.build-people.outputs.digest }}"
            echo "- Frontend tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FRONTEND_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}"
            echo "- Frontend SHA tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FRONTEND_IMAGE }}:${{ needs.release-plan.outputs.short_sha }}"
            echo "- Frontend latest tag: ${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FRONTEND_IMAGE }}:latest"
            echo "- Frontend digest: ${{ steps.build-frontend.outputs.digest }}"
            echo "- Provenance/SBOM: enabled via docker/build-push-action@v6"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-ghcr:
    name: Publish images to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: [release-plan, wait-for-quality-gate]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: ghcr-meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.release-plan.outputs.image_tag }}
            type=raw,value=${{ needs.release-plan.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=CampusCore Backend API
            org.opencontainers.image.description=CampusCore NestJS API with JWT auth, Prisma, PostgreSQL, Redis, RabbitMQ, MinIO, health checks, and Swagger docs.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.release-plan.outputs.source_sha }}
            org.opencontainers.image.version=${{ needs.release-plan.outputs.image_tag }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CampusCore

      - name: Build and push backend
        id: ghcr-build-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.ghcr-meta-backend.outputs.tags }}
          labels: ${{ steps.ghcr-meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: true
          sbom: true

      - name: Docker metadata (auth service)
        id: ghcr-meta-auth
