  verify-release-artifacts:
    name: Verify published release artifacts
    runs-on: ubuntu-latest
    needs: [release-plan, wait-for-quality-gate, publish-ghcr, publish-dockerhub]
    if: >
      always() &&
      needs.publish-ghcr.result == 'success' &&
      (needs.release-plan.outputs.should_publish_dockerhub != 'true' || needs.publish-dockerhub.result == 'success')
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: needs.release-plan.outputs.should_publish_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Verify GHCR manifests
        shell: bash
        run: |
          set -euo pipefail
          images=(
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.BACKEND_IMAGE }}"
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.AUTH_IMAGE }}"
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.NOTIFICATION_IMAGE }}"
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.FINANCE_IMAGE }}"
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ACADEMIC_IMAGE }}"
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ANALYTICS_IMAGE }}"
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ENGAGEMENT_IMAGE }}"
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.PEOPLE_IMAGE }}"
            "ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.FRONTEND_IMAGE }}"
          )
          tags=(
            "${{ needs.release-plan.outputs.image_tag }}"
            "${{ needs.release-plan.outputs.short_sha }}"
            "latest"
          )
          for image in "${images[@]}"; do
            for tag in "${tags[@]}"; do
              docker manifest inspect "${image}:${tag}" > /dev/null
            done
          done

      - name: Verify Docker Hub manifests
        if: needs.release-plan.outputs.should_publish_dockerhub == 'true'
        shell: bash
        run: |
          set -euo pipefail
          images=(
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.BACKEND_IMAGE }}"
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.AUTH_IMAGE }}"
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.NOTIFICATION_IMAGE }}"
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FINANCE_IMAGE }}"
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ACADEMIC_IMAGE }}"
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ANALYTICS_IMAGE }}"
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.ENGAGEMENT_IMAGE }}"
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.PEOPLE_IMAGE }}"
            "${{ needs.release-plan.outputs.dockerhub_namespace }}/${{ env.FRONTEND_IMAGE }}"
          )
          tags=(
            "${{ needs.release-plan.outputs.image_tag }}"
            "${{ needs.release-plan.outputs.short_sha }}"
            "latest"
          )
          for image in "${images[@]}"; do
            for tag in "${tags[@]}"; do
              docker manifest inspect "${image}:${tag}" > /dev/null
            done
          done

      - name: Smoke published GHCR images
        env:
          E2E_USE_PREBUILT_IMAGES: '1'
          E2E_CORE_API_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.BACKEND_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_AUTH_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.AUTH_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_NOTIFICATION_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.NOTIFICATION_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_FINANCE_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.FINANCE_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_ACADEMIC_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ACADEMIC_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_ANALYTICS_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ANALYTICS_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_ENGAGEMENT_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ENGAGEMENT_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_PEOPLE_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.PEOPLE_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_FRONTEND_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.FRONTEND_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
        run: node scripts/run-image-smoke.mjs

      - name: Edge E2E against published GHCR images
        working-directory: frontend
        env:
          E2E_USE_PREBUILT_IMAGES: '1'
          E2E_CORE_API_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.BACKEND_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_AUTH_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.AUTH_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_NOTIFICATION_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.NOTIFICATION_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_FINANCE_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.FINANCE_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_ACADEMIC_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ACADEMIC_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_ANALYTICS_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ANALYTICS_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_ENGAGEMENT_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.ENGAGEMENT_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_PEOPLE_SERVICE_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.PEOPLE_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
          E2E_FRONTEND_IMAGE: ghcr.io/${{ needs.release-plan.outputs.ghcr_namespace }}/${{ env.FRONTEND_IMAGE }}:${{ needs.release-plan.outputs.image_tag }}
        run: npm run test:e2e:edge

      - name: Upload release verification logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-logs
          path: |
            frontend/test-results/image-smoke-stack
            frontend/test-results/edge-e2e-stack
            frontend/playwright-report
            frontend/test-results

      - name: Summary
        run: |
          {
            echo "## Published artifact verification"
            echo ""
            echo "- CI gate run: ${{ needs.wait-for-quality-gate.outputs.ci_run_url }}"
            echo "- Release tag: ${{ needs.release-plan.outputs.image_tag }}"
            echo "- Verified remote manifests for GHCR and Docker Hub (when configured)"
            echo "- Smoke target: published GHCR release images"
          } >> "$GITHUB_STEP_SUMMARY"
