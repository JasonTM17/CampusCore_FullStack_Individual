  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    needs:
      [
        core-quality,
        core-integration,
        auth-quality,
        auth-integration,
        notification-quality,
        notification-integration,
        finance-quality,
        finance-integration,
        academic-quality,
        academic-integration,
        engagement-quality,
        engagement-integration,
        people-quality,
        people-integration,
        analytics-quality,
        analytics-integration,
        frontend-quality,
        frontend-fast-e2e,
        compose-contract,
        k8s-contract,
      ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            packages/platform-auth/package-lock.json
            backend/package-lock.json
            auth-service/package-lock.json
            notification-service/package-lock.json
            finance-service/package-lock.json
            academic-service/package-lock.json
            engagement-service/package-lock.json
            people-service/package-lock.json
            analytics-service/package-lock.json
            frontend/package-lock.json

      - name: Prepare scan directory
        run: mkdir -p security-results

      - name: Gitleaks repo scan
        id: gitleaks
        continue-on-error: true
        uses: gacts/gitleaks@v1
        with:
          path: .

      - name: Collect gitleaks SARIF
        if: always() && steps.gitleaks.outputs.sarif != ''
        run: cp "${{ steps.gitleaks.outputs.sarif }}" security-results/gitleaks.sarif

      - name: Install shared auth package dependencies
        working-directory: packages/platform-auth
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install auth-service dependencies
        working-directory: auth-service
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install notification service dependencies
        working-directory: notification-service
        run: npm ci

      - name: Install finance service dependencies
        working-directory: finance-service
        run: npm ci

      - name: Install academic service dependencies
        working-directory: academic-service
        run: npm ci

      - name: Install engagement service dependencies
        working-directory: engagement-service
        run: npm ci

      - name: Install people service dependencies
        working-directory: people-service
        run: npm ci

      - name: Install analytics service dependencies
        working-directory: analytics-service
        run: npm ci

      - name: Platform auth npm audit
        id: platform-auth-npm-audit
        continue-on-error: true
        working-directory: packages/platform-auth
        run: npm audit --audit-level=high --json > ../../security-results/platform-auth-npm-audit.json 2> ../../security-results/platform-auth-npm-audit.stderr.log

      - name: Backend npm audit
        id: backend-npm-audit
        continue-on-error: true
        working-directory: backend
        run: npm audit --audit-level=high --json > ../security-results/backend-npm-audit.json 2> ../security-results/backend-npm-audit.stderr.log

      - name: Frontend npm audit
        id: frontend-npm-audit
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high --json > ../security-results/frontend-npm-audit.json 2> ../security-results/frontend-npm-audit.stderr.log

      - name: Auth service npm audit
        id: auth-npm-audit
        continue-on-error: true
        working-directory: auth-service
        run: npm audit --audit-level=high --json > ../security-results/auth-npm-audit.json 2> ../security-results/auth-npm-audit.stderr.log

      - name: Notification service npm audit
        id: notification-npm-audit
        continue-on-error: true
        working-directory: notification-service
        run: npm audit --audit-level=high --json > ../security-results/notification-npm-audit.json 2> ../security-results/notification-npm-audit.stderr.log

      - name: Finance service npm audit
        id: finance-npm-audit
        continue-on-error: true
        working-directory: finance-service
        run: npm audit --audit-level=high --json > ../security-results/finance-npm-audit.json 2> ../security-results/finance-npm-audit.stderr.log

      - name: Academic service npm audit
        id: academic-npm-audit
        continue-on-error: true
        working-directory: academic-service
        run: npm audit --audit-level=high --json > ../security-results/academic-npm-audit.json 2> ../security-results/academic-npm-audit.stderr.log

      - name: Engagement service npm audit
        id: engagement-npm-audit
        continue-on-error: true
        working-directory: engagement-service
        run: npm audit --audit-level=high --json > ../security-results/engagement-npm-audit.json 2> ../security-results/engagement-npm-audit.stderr.log

      - name: People service npm audit
        id: people-npm-audit
        continue-on-error: true
        working-directory: people-service
        run: npm audit --audit-level=high --json > ../security-results/people-npm-audit.json 2> ../security-results/people-npm-audit.stderr.log

      - name: Analytics service npm audit
        id: analytics-npm-audit
        continue-on-error: true
        working-directory: analytics-service
        run: npm audit --audit-level=high --json > ../security-results/analytics-npm-audit.json 2> ../security-results/analytics-npm-audit.stderr.log

      - name: Platform auth filesystem scan
        id: trivy-platform-auth-fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: packages/platform-auth
          format: sarif
          output: security-results/trivy-platform-auth-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Filesystem scan
        id: trivy-fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: security-results/trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Auth service filesystem scan
        id: trivy-auth-fs
        continue-on-error: true
