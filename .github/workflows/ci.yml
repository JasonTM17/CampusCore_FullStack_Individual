name: CI Build and Test

on:
  push:
    branches: [master, main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npm run prisma:generate

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Check formatting
        working-directory: backend
        run: npm run lint:format

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Unit tests
        working-directory: backend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test:unit -- --runInBand

  backend-integration:
    name: backend-integration
    runs-on: ubuntu-latest
    needs: backend-quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: campuscore
          POSTGRES_USER: campuscore
          POSTGRES_PASSWORD: ci-postgres-password
        options: >-
          --health-cmd "pg_isready -U campuscore -d campuscore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: campuscore
          RABBITMQ_DEFAULT_PASS: ci-rabbitmq-password
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npm run prisma:generate

      - name: Push Prisma schema
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://campuscore:ci-postgres-password@postgres:5432/campuscore?schema=public
          REDIS_URL: redis://redis:6379
          RABBITMQ_URL: amqp://campuscore:ci-rabbitmq-password@rabbitmq:5672
          FRONTEND_URL: http://127.0.0.1
          JWT_SECRET: ci-jwt-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          HEALTH_READINESS_KEY: ci-health-readiness-key
          COOKIE_SECURE: 'false'
        run: npx prisma db push --skip-generate

      - name: Seed database
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://campuscore:ci-postgres-password@postgres:5432/campuscore?schema=public
          REDIS_URL: redis://redis:6379
          RABBITMQ_URL: amqp://campuscore:ci-rabbitmq-password@rabbitmq:5672
          FRONTEND_URL: http://127.0.0.1
          JWT_SECRET: ci-jwt-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          HEALTH_READINESS_KEY: ci-health-readiness-key
          COOKIE_SECURE: 'false'
        run: npm run prisma:seed

      - name: Integration tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://campuscore:ci-postgres-password@postgres:5432/campuscore?schema=public
          REDIS_URL: redis://redis:6379
          RABBITMQ_URL: amqp://campuscore:ci-rabbitmq-password@rabbitmq:5672
          FRONTEND_URL: http://127.0.0.1
          JWT_SECRET: ci-jwt-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          HEALTH_READINESS_KEY: ci-health-readiness-key
          COOKIE_SECURE: 'false'
        run: npm run test:integration -- --runInBand

      - name: Upload backend integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-logs
          path: |
            backend/coverage
            backend/test-results

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  frontend-fast-e2e:
    name: frontend-fast-e2e
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run fast E2E
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload fast E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fast-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results

  compose-contract:
    name: compose-contract
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      HEALTH_READINESS_KEY: ci-health-readiness-key
      RABBITMQ_USER: campuscore
      RABBITMQ_PASSWORD: ci-rabbitmq-password
      MINIO_USER: campuscore
      MINIO_PASSWORD: ci-minio-password
      DOCKERHUB_NAMESPACE: ci-namespace
      IMAGE_TAG: latest
      FRONTEND_URL: http://localhost

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate docker-compose.production.yml
        run: docker compose -f docker-compose.production.yml config > /dev/null

      - name: Validate docker-compose.e2e.yml
        run: docker compose -f docker-compose.e2e.yml config > /dev/null

      - name: Check diff whitespace
        run: git diff --check

  image-smoke:
    name: image-smoke
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, backend-integration, frontend-fast-e2e, compose-contract]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run image smoke
        run: node scripts/run-image-smoke.mjs

      - name: Upload image smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: image-smoke-logs
          path: frontend/test-results/image-smoke-stack

  edge-e2e:
    name: edge-e2e
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, backend-integration, frontend-fast-e2e, compose-contract]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run edge E2E
        working-directory: frontend
        run: npm run test:e2e:edge

      - name: Upload edge stack logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: edge-e2e-stack-logs
          path: frontend/test-results/edge-e2e-stack

      - name: Upload edge E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: edge-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, backend-integration, frontend-fast-e2e, compose-contract]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare scan directory
        run: mkdir -p trivy-results

      - name: Filesystem scan
        id: trivy-fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results/trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Build backend image for scan
        run: docker build -f backend/Dockerfile -t campuscore-backend:security .

      - name: Build frontend image for scan
        run: docker build -f frontend/Dockerfile -t campuscore-frontend:security .

      - name: Backend image scan
        id: trivy-backend-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: campuscore-backend:security
          format: sarif
          output: trivy-results/trivy-backend-image.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Frontend image scan
        id: trivy-frontend-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: campuscore-frontend:security
          format: sarif
          output: trivy-results/trivy-frontend-image.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload filesystem SARIF
        if: always() && hashFiles('trivy-results/trivy-fs.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results/trivy-fs.sarif
          category: trivy-fs

      - name: Upload backend image SARIF
        if: always() && hashFiles('trivy-results/trivy-backend-image.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results/trivy-backend-image.sarif
          category: trivy-backend-image

      - name: Upload frontend image SARIF
        if: always() && hashFiles('trivy-results/trivy-frontend-image.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results/trivy-frontend-image.sarif
          category: trivy-frontend-image

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: trivy-results

      - name: Enforce scan gate
        if: always()
        run: |
          if [ "${{ steps.trivy-fs.outcome }}" != "success" ] || \
             [ "${{ steps.trivy-backend-image.outcome }}" != "success" ] || \
             [ "${{ steps.trivy-frontend-image.outcome }}" != "success" ]; then
            echo "Security scan failed at HIGH/CRITICAL severity threshold."
            exit 1
          fi

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-integration
      - frontend-quality
      - frontend-fast-e2e
      - compose-contract
      - image-smoke
      - edge-e2e
      - security-scan
      - dependency-review
    if: always()

    steps:
      - name: Assert all quality lanes passed
        run: |
          failures=0

          check_required() {
            local lane_name="$1"
            local lane_result="$2"

            if [ "$lane_result" != "success" ]; then
              echo "::error title=${lane_name} failed::${lane_name} result was ${lane_result}"
              failures=1
            fi
          }

          check_optional_pr_lane() {
            local lane_name="$1"
            local lane_result="$2"

            if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$lane_result" != "success" ]; then
              echo "::error title=${lane_name} failed::${lane_name} result was ${lane_result}"
              failures=1
            fi
          }

          check_required backend-quality "${{ needs.backend-quality.result }}"
          check_required backend-integration "${{ needs.backend-integration.result }}"
          check_required frontend-quality "${{ needs.frontend-quality.result }}"
          check_required frontend-fast-e2e "${{ needs.frontend-fast-e2e.result }}"
          check_required compose-contract "${{ needs.compose-contract.result }}"
          check_required image-smoke "${{ needs.image-smoke.result }}"
          check_required edge-e2e "${{ needs.edge-e2e.result }}"
          check_required security-scan "${{ needs.security-scan.result }}"
          check_optional_pr_lane dependency-review "${{ needs.dependency-review.result }}"

          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

      - name: Summary
        run: |
          {
            echo "## Quality gate"
            echo ""
            echo "- backend-quality: ${{ needs.backend-quality.result }}"
            echo "- backend-integration: ${{ needs.backend-integration.result }}"
            echo "- frontend-quality: ${{ needs.frontend-quality.result }}"
            echo "- frontend-fast-e2e: ${{ needs.frontend-fast-e2e.result }}"
            echo "- compose-contract: ${{ needs.compose-contract.result }}"
            echo "- image-smoke: ${{ needs.image-smoke.result }}"
            echo "- edge-e2e: ${{ needs.edge-e2e.result }}"
            echo "- security-scan: ${{ needs.security-scan.result }}"
            echo "- dependency-review: ${{ needs.dependency-review.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
