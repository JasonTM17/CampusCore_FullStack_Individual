             [ "${{ steps.trivy-academic-image.outcome }}" != "success" ] || \
             [ "${{ steps.trivy-engagement-image.outcome }}" != "success" ] || \
             [ "${{ steps.trivy-people-image.outcome }}" != "success" ] || \
             [ "${{ steps.trivy-analytics-image.outcome }}" != "success" ]; then
            echo "Security scan failed. Review npm audit, gitleaks, and Trivy reports."
            exit 1
          fi

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Document push coverage
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Dependency review"
            echo ""
            echo "Dependency Review compares dependency changes on pull requests only."
            echo "For push and semver tag runs, npm audit and Trivy coverage are enforced by the security-scan lane."
          } >> "$GITHUB_STEP_SUMMARY"

  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    needs:
      - architecture-guard
      - core-quality
      - core-integration
      - auth-quality
      - auth-integration
      - notification-quality
      - notification-integration
      - finance-quality
      - finance-integration
      - academic-quality
      - academic-integration
      - engagement-quality
      - engagement-integration
      - people-quality
      - people-integration
      - analytics-quality
      - analytics-integration
      - frontend-quality
      - frontend-fast-e2e
      - compose-contract
      - k8s-contract
      - image-smoke
      - edge-e2e
      - security-scan
      - dependency-review
    if: always()

    steps:
      - name: Assert all quality lanes passed
        run: |
          failures=0

          check_required() {
            local lane_name="$1"
            local lane_result="$2"

            if [ "$lane_result" != "success" ]; then
              echo "::error title=${lane_name} failed::${lane_name} result was ${lane_result}"
              failures=1
            fi
          }

          check_required architecture-guard "${{ needs.architecture-guard.result }}"
          check_required core-quality "${{ needs.core-quality.result }}"
          check_required core-integration "${{ needs.core-integration.result }}"
          check_required auth-quality "${{ needs.auth-quality.result }}"
          check_required auth-integration "${{ needs.auth-integration.result }}"
          check_required notification-quality "${{ needs.notification-quality.result }}"
          check_required notification-integration "${{ needs.notification-integration.result }}"
          check_required finance-quality "${{ needs.finance-quality.result }}"
          check_required finance-integration "${{ needs.finance-integration.result }}"
          check_required academic-quality "${{ needs.academic-quality.result }}"
          check_required academic-integration "${{ needs.academic-integration.result }}"
          check_required engagement-quality "${{ needs.engagement-quality.result }}"
          check_required engagement-integration "${{ needs.engagement-integration.result }}"
          check_required people-quality "${{ needs.people-quality.result }}"
          check_required people-integration "${{ needs.people-integration.result }}"
          check_required analytics-quality "${{ needs.analytics-quality.result }}"
          check_required analytics-integration "${{ needs.analytics-integration.result }}"
          check_required frontend-quality "${{ needs.frontend-quality.result }}"
          check_required frontend-fast-e2e "${{ needs.frontend-fast-e2e.result }}"
          check_required compose-contract "${{ needs.compose-contract.result }}"
          check_required k8s-contract "${{ needs.k8s-contract.result }}"
          check_required image-smoke "${{ needs.image-smoke.result }}"
          check_required edge-e2e "${{ needs.edge-e2e.result }}"
          check_required security-scan "${{ needs.security-scan.result }}"
          check_required dependency-review "${{ needs.dependency-review.result }}"

          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

      - name: Summary
        run: |
          {
            echo "## Quality gate"
            echo ""
            echo "- architecture-guard: ${{ needs.architecture-guard.result }}"
            echo "- core-quality: ${{ needs.core-quality.result }}"
            echo "- core-integration: ${{ needs.core-integration.result }}"
            echo "- auth-quality: ${{ needs.auth-quality.result }}"
            echo "- auth-integration: ${{ needs.auth-integration.result }}"
            echo "- notification-quality: ${{ needs.notification-quality.result }}"
            echo "- notification-integration: ${{ needs.notification-integration.result }}"
            echo "- finance-quality: ${{ needs.finance-quality.result }}"
            echo "- finance-integration: ${{ needs.finance-integration.result }}"
            echo "- academic-quality: ${{ needs.academic-quality.result }}"
            echo "- academic-integration: ${{ needs.academic-integration.result }}"
            echo "- engagement-quality: ${{ needs.engagement-quality.result }}"
            echo "- engagement-integration: ${{ needs.engagement-integration.result }}"
            echo "- people-quality: ${{ needs.people-quality.result }}"
            echo "- people-integration: ${{ needs.people-integration.result }}"
            echo "- analytics-quality: ${{ needs.analytics-quality.result }}"
            echo "- analytics-integration: ${{ needs.analytics-integration.result }}"
            echo "- frontend-quality: ${{ needs.frontend-quality.result }}"
            echo "- frontend-fast-e2e: ${{ needs.frontend-fast-e2e.result }}"
            echo "- compose-contract: ${{ needs.compose-contract.result }}"
            echo "- k8s-contract: ${{ needs.k8s-contract.result }}"
            echo "- image-smoke: ${{ needs.image-smoke.result }}"
            echo "- edge-e2e: ${{ needs.edge-e2e.result }}"
            echo "- security-scan: ${{ needs.security-scan.result }}"
            echo "- dependency-review: ${{ needs.dependency-review.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
