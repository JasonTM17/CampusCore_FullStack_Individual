name: CI Build and Test

on:
  push:
    branches: [master, main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-guard:
    name: architecture-guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/platform-auth/package-lock.json

      - name: Install shared auth package dependencies
        working-directory: packages/platform-auth
        run: npm ci

      - name: Test shared auth package
        working-directory: packages/platform-auth
        run: npm test

      - name: Enforce architecture guard
        run: node scripts/check-architecture.mjs

      - name: Enforce documentation hygiene guard
        run: node scripts/check-doc-hygiene.mjs

  core-quality:
    name: core-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npm run prisma:generate

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Check formatting
        working-directory: backend
        run: npm run lint:format

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Unit tests
        working-directory: backend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run test:unit -- --runInBand

  core-integration:
    name: core-integration
    runs-on: ubuntu-latest
    needs: core-quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: campuscore
          POSTGRES_USER: campuscore
          POSTGRES_PASSWORD: ci-postgres-password
        options: >-
          --health-cmd "pg_isready -U campuscore -d campuscore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: campuscore
          RABBITMQ_DEFAULT_PASS: ci-rabbitmq-password
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
        ports:
          - 5672:5672

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npm run prisma:generate

      - name: Push Prisma schema
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://campuscore:ci-postgres-password@127.0.0.1:5432/campuscore?schema=public
          REDIS_URL: redis://127.0.0.1:6379
          RABBITMQ_URL: amqp://campuscore:ci-rabbitmq-password@127.0.0.1:5672
          FRONTEND_URL: http://127.0.0.1
          JWT_SECRET: ci-jwt-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          HEALTH_READINESS_KEY: ci-health-readiness-key
          COOKIE_SECURE: 'false'
          INTERNAL_SERVICE_TOKEN: ci-internal-service-token
        run: npx prisma db push --skip-generate

      - name: Seed database
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://campuscore:ci-postgres-password@127.0.0.1:5432/campuscore?schema=public
          REDIS_URL: redis://127.0.0.1:6379
          RABBITMQ_URL: amqp://campuscore:ci-rabbitmq-password@127.0.0.1:5672
          FRONTEND_URL: http://127.0.0.1
          JWT_SECRET: ci-jwt-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          HEALTH_READINESS_KEY: ci-health-readiness-key
          COOKIE_SECURE: 'false'
          INTERNAL_SERVICE_TOKEN: ci-internal-service-token
        run: npm run prisma:seed

      - name: Integration tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://campuscore:ci-postgres-password@127.0.0.1:5432/campuscore?schema=public
          REDIS_URL: redis://127.0.0.1:6379
          RABBITMQ_URL: amqp://campuscore:ci-rabbitmq-password@127.0.0.1:5672
          FRONTEND_URL: http://127.0.0.1
          JWT_SECRET: ci-jwt-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          HEALTH_READINESS_KEY: ci-health-readiness-key
          COOKIE_SECURE: 'false'
          INTERNAL_SERVICE_TOKEN: ci-internal-service-token
        run: npm run test:integration -- --runInBand

      - name: Upload core integration logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-integration-logs
          path: |
            backend/coverage
            backend/test-results

