name: CI Build and Test

on:
  push:
    branches: [master, main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Check formatting
        working-directory: backend
        run: npm run lint:format

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Test
        working-directory: backend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm test -- --runInBand

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  compose-contract:
    name: compose-contract
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      RABBITMQ_USER: campuscore
      RABBITMQ_PASSWORD: ci-rabbitmq-password
      MINIO_USER: campuscore
      MINIO_PASSWORD: ci-minio-password
      DOCKERHUB_NAMESPACE: ci-namespace
      IMAGE_TAG: latest
      FRONTEND_URL: http://localhost

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate docker-compose.production.yml
        run: docker compose -f docker-compose.production.yml config > /dev/null

      - name: Validate docker-compose.e2e.yml
        run: docker compose -f docker-compose.e2e.yml config > /dev/null

      - name: Check diff whitespace
        run: git diff --check

  image-smoke:
    name: image-smoke
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, compose-contract]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run image smoke
        run: node scripts/run-image-smoke.mjs

      - name: Upload image smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: image-smoke-logs
          path: frontend/test-results/image-smoke-stack

  edge-e2e:
    name: edge-e2e
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, compose-contract]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run edge E2E
        working-directory: frontend
        run: npm run test:e2e:edge

      - name: Upload edge stack logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: edge-e2e-stack-logs
          path: frontend/test-results/edge-e2e-stack

      - name: Upload edge E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: edge-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, compose-contract]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare scan directory
        run: mkdir -p trivy-results

      - name: Filesystem scan
        id: trivy-fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results/trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Build backend image for scan
        run: docker build -f backend/Dockerfile -t campuscore-backend:security .

      - name: Build frontend image for scan
        run: docker build -f frontend/Dockerfile -t campuscore-frontend:security .

      - name: Backend image scan
        id: trivy-backend-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: campuscore-backend:security
          format: sarif
          output: trivy-results/trivy-backend-image.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Frontend image scan
        id: trivy-frontend-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: campuscore-frontend:security
          format: sarif
          output: trivy-results/trivy-frontend-image.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload filesystem SARIF
        if: always() && hashFiles('trivy-results/trivy-fs.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results/trivy-fs.sarif
          category: trivy-fs

      - name: Upload backend image SARIF
        if: always() && hashFiles('trivy-results/trivy-backend-image.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results/trivy-backend-image.sarif
          category: trivy-backend-image

      - name: Upload frontend image SARIF
        if: always() && hashFiles('trivy-results/trivy-frontend-image.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results/trivy-frontend-image.sarif
          category: trivy-frontend-image

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: trivy-results

      - name: Enforce scan gate
        if: always()
        run: |
          if [ "${{ steps.trivy-fs.outcome }}" != "success" ] || \
             [ "${{ steps.trivy-backend-image.outcome }}" != "success" ] || \
             [ "${{ steps.trivy-frontend-image.outcome }}" != "success" ]; then
            echo "Security scan failed at HIGH/CRITICAL severity threshold."
            exit 1
          fi

  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
      - compose-contract
      - image-smoke
      - edge-e2e
      - security-scan
    if: always()

    steps:
      - name: Assert all quality lanes passed
        run: |
          if [ "${{ needs.backend-quality.result }}" != "success" ] || \
             [ "${{ needs.frontend-quality.result }}" != "success" ] || \
             [ "${{ needs.compose-contract.result }}" != "success" ] || \
             [ "${{ needs.image-smoke.result }}" != "success" ] || \
             [ "${{ needs.edge-e2e.result }}" != "success" ] || \
             [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "At least one quality lane failed."
            exit 1
          fi

      - name: Summary
        run: |
          {
            echo "## Quality gate"
            echo ""
            echo "- backend-quality: ${{ needs.backend-quality.result }}"
            echo "- frontend-quality: ${{ needs.frontend-quality.result }}"
            echo "- compose-contract: ${{ needs.compose-contract.result }}"
            echo "- image-smoke: ${{ needs.image-smoke.result }}"
            echo "- edge-e2e: ${{ needs.edge-e2e.result }}"
            echo "- security-scan: ${{ needs.security-scan.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
