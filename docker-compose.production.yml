version: '3.8'

# Production deployment using Docker Hub images
# Usage: docker-compose -f docker-compose.production.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: campuscore-db
    environment:
      POSTGRES_USER: campuscore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: campuscore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campuscore -d campuscore"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless_stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: campuscore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless_stopped

  # Backend API (from Docker Hub)
  backend:
    image: nguyenson1710/campuscore-backend:${IMAGE_TAG:-latest}
    container_name: campuscore-api
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD}@postgres:5432/campuscore
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless_stopped

  # Frontend (from Docker Hub)
  frontend:
    image: nguyenson1710/campuscore-frontend:${IMAGE_TAG:-latest}
    container_name: campuscore-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless_stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: campuscore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless_stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: campuscore-network
