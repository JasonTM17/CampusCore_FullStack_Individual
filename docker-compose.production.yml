# Production deployment using semver-tagged release images
# Bootstrap once: docker compose -f docker-compose.production.yml --profile bootstrap run --rm core-api-init
# Bootstrap once: docker compose -f docker-compose.production.yml --profile bootstrap run --rm notification-service-init
# Bootstrap once: docker compose -f docker-compose.production.yml --profile bootstrap run --rm finance-service-init
# Runtime stack: IMAGE_TAG=v1.0.0 docker compose -f docker-compose.production.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: campuscore-db
    environment:
      POSTGRES_USER: campuscore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: campuscore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campuscore -d campuscore"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: campuscore-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: campuscore-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-campuscore}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: campuscore-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-campuscore}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?set MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  core-api-init:
    profiles: ["bootstrap"]
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/campuscore-backend:${IMAGE_TAG:?set IMAGE_TAG to a semver release tag such as v1.0.0}
    container_name: campuscore-core-api-init
    command:
      - sh
      - -lc
      - npx prisma@5.8.1 db push --schema prisma/schema.prisma --skip-generate && npx tsx@4.21.0 prisma/seed.ts
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/campuscore?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  core-api:
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/campuscore-backend:${IMAGE_TAG:?set IMAGE_TAG to a semver release tag such as v1.0.0}
    container_name: campuscore-api
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/campuscore
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:?set HEALTH_READINESS_KEY}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_BUCKET: campuscore
      MINIO_ACCESS_KEY: ${MINIO_USER:-campuscore}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:?set MINIO_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --header=\"X-Health-Key: ${HEALTH_READINESS_KEY:?set HEALTH_READINESS_KEY}\" -O- http://localhost:4000/api/v1/health/readiness >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  notification-service-init:
    profiles: ["bootstrap"]
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/campuscore-notification-service:${IMAGE_TAG:?set IMAGE_TAG to a semver release tag such as v1.0.0}
    container_name: campuscore-notification-service-init
    command:
      - sh
      - -lc
      - npx prisma@5.8.1 db push --schema prisma/schema.prisma --skip-generate && npx tsx@4.21.0 prisma/migrate-legacy-notifications.ts
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/campuscore?schema=notifications
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  finance-service-init:
    profiles: ["bootstrap"]
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/campuscore-finance-service:${IMAGE_TAG:?set IMAGE_TAG to a semver release tag such as v1.0.0}
    container_name: campuscore-finance-service-init
    command:
      - sh
      - -lc
      - npx prisma@5.8.1 db push --schema prisma/schema.prisma --skip-generate && npx tsx@4.21.0 prisma/migrate-legacy-finance.ts
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/campuscore?schema=finance
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:?set HEALTH_READINESS_KEY}
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD}@rabbitmq:5672
      CORE_API_INTERNAL_URL: http://core-api:4000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core-api:
        condition: service_healthy
    restart: "no"

  notification-service:
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/campuscore-notification-service:${IMAGE_TAG:?set IMAGE_TAG to a semver release tag such as v1.0.0}
    container_name: campuscore-notification-service
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/campuscore?schema=notifications
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:?set HEALTH_READINESS_KEY}
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD}@rabbitmq:5672
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: 4001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --header=\"X-Health-Key: ${HEALTH_READINESS_KEY:?set HEALTH_READINESS_KEY}\" -O- http://localhost:4001/api/v1/health/readiness >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  finance-service:
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/campuscore-finance-service:${IMAGE_TAG:?set IMAGE_TAG to a semver release tag such as v1.0.0}
    container_name: campuscore-finance-service
    environment:
      DATABASE_URL: postgresql://campuscore:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/campuscore?schema=finance
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      HEALTH_READINESS_KEY: ${HEALTH_READINESS_KEY:?set HEALTH_READINESS_KEY}
      RABBITMQ_URL: amqp://campuscore:${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD}@rabbitmq:5672
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORE_API_INTERNAL_URL: http://core-api:4000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@campuscore.edu}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-CampusCore Administration}
      PORT: 4002
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --header=\"X-Health-Key: ${HEALTH_READINESS_KEY:?set HEALTH_READINESS_KEY}\" -O- http://localhost:4002/api/v1/health/readiness >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${DOCKERHUB_NAMESPACE:-your-dockerhub-namespace}/campuscore-frontend:${IMAGE_TAG:?set IMAGE_TAG to a semver release tag such as v1.0.0}
    container_name: campuscore-web
    environment:
      NODE_ENV: production
    depends_on:
      core-api:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: campuscore-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      core-api:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  default:
    name: campuscore-network
