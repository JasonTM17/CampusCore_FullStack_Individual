apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
        - name: core-api
          image: campuscore-backend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: campuscore-shared-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: POSTGRES_PASSWORD
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: RABBITMQ_PASSWORD
            - name: MINIO_USER
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: MINIO_USER
            - name: MINIO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: MINIO_PASSWORD
            - name: DATABASE_URL
              value: postgresql://campuscore:$(POSTGRES_PASSWORD)@postgres:5432/campuscore
            - name: REDIS_URL
              value: redis://redis:6379
            - name: RABBITMQ_URL
              value: amqp://campuscore:$(RABBITMQ_PASSWORD)@rabbitmq:5672
            - name: MINIO_ENDPOINT
              value: minio
            - name: MINIO_ACCESS_KEY
              value: $(MINIO_USER)
            - name: MINIO_SECRET_KEY
              value: $(MINIO_PASSWORD)
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: JWT_REFRESH_SECRET
            - name: HEALTH_READINESS_KEY
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: HEALTH_READINESS_KEY
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: INTERNAL_SERVICE_TOKEN
            - name: PORT
              value: "4000"
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - wget --no-verbose --tries=1 --header="X-Health-Key: $HEALTH_READINESS_KEY" -O- http://127.0.0.1:4000/api/v1/health/readiness >/dev/null
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
spec:
  selector:
    app: core-api
  ports:
    - name: http
      port: 4000
      targetPort: 4000
