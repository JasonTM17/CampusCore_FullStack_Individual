apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: campuscore-notification-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
              name: http
          envFrom:
            - configMapRef:
                name: campuscore-shared-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: POSTGRES_PASSWORD
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: RABBITMQ_PASSWORD
            - name: DATABASE_URL
              value: postgresql://campuscore:$(POSTGRES_PASSWORD)@postgres:5432/campuscore?schema=notifications
            - name: RABBITMQ_URL
              value: amqp://campuscore:$(RABBITMQ_PASSWORD)@rabbitmq:5672
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: JWT_SECRET
            - name: HEALTH_READINESS_KEY
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: HEALTH_READINESS_KEY
            - name: PORT
              value: "4001"
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - wget --no-verbose --tries=1 --header="X-Health-Key: $HEALTH_READINESS_KEY" -O- http://127.0.0.1:4001/api/v1/health/readiness >/dev/null
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness
              port: 4001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 4001
      targetPort: 4001
