apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - until pg_isready -h postgres -p 5432 -U campuscore -d campuscore; do sleep 2; done
      containers:
        - name: analytics-service
          image: campuscore-analytics-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4006
              name: http
          envFrom:
            - configMapRef:
                name: campuscore-shared-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: POSTGRES_PASSWORD
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: RABBITMQ_PASSWORD
            - name: DATABASE_URL
              value: postgresql://campuscore:$(POSTGRES_PASSWORD)@postgres:5432/campuscore?schema=public
            - name: RABBITMQ_URL
              value: amqp://campuscore:$(RABBITMQ_PASSWORD)@rabbitmq:5672
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: JWT_SECRET
            - name: HEALTH_READINESS_KEY
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: HEALTH_READINESS_KEY
            - name: PORT
              value: "4006"
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - 'wget --no-verbose --tries=1 --header="X-Health-Key: $HEALTH_READINESS_KEY" -O- http://127.0.0.1:4006/api/v1/health/readiness >/dev/null'
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
          startupProbe:
            exec:
              command:
                - sh
                - -lc
                - 'wget --no-verbose --tries=1 --header="X-Health-Key: $HEALTH_READINESS_KEY" -O- http://127.0.0.1:4006/api/v1/health/readiness >/dev/null'
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness
              port: 4006
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
    - name: http
      port: 4006
      targetPort: 4006
