worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 25m;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=120r/s;
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;
    limit_req_status 429;
    limit_conn_status 429;

    upstream core_api_upstream {
        server core-api:4000;
        keepalive 32;
    }

    upstream auth_service_upstream {
        server auth-service:4007;
        keepalive 32;
    }

    upstream notification_service_upstream {
        server notification-service:4001;
        keepalive 32;
    }

    upstream finance_service_upstream {
        server finance-service:4002;
        keepalive 32;
    }

    upstream academic_service_upstream {
        server academic-service:4003;
        keepalive 32;
    }

    upstream engagement_service_upstream {
        server engagement-service:4004;
        keepalive 32;
    }

    upstream people_service_upstream {
        server people-service:4005;
        keepalive 32;
    }

    upstream analytics_service_upstream {
        server analytics-service:4006;
        keepalive 32;
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        location = /health {
            proxy_pass http://core_api_upstream/api/v1/health/liveness;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/health {
            return 403;
        }

        location = /api/v1/health/liveness {
            return 403;
        }

        location = /api/v1/health/readiness {
            return 403;
        }

        location ^~ /internal/ {
            return 403;
        }

        location ^~ /api/v1/internal/ {
            return 403;
        }

        location ^~ /api/docs {
            proxy_pass http://core_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/notifications {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://notification_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/notifications/ {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://notification_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/finance {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://finance_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/finance/ {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://finance_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/announcements {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://engagement_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/announcements/ {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://engagement_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/analytics {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://analytics_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/analytics/ {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://analytics_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/support-tickets {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://engagement_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/support-tickets/ {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://engagement_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/v1/(academic-years|attendance|classrooms|courses|curricula|departments|enrollments|faculties|grades|schedules|sections|semesters|waitlist)(/|$) {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://academic_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/students {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://people_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/students/ {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://people_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/v1/lecturers {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://people_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/v1/lecturers/ {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://people_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/v1/(auth|users|roles|permissions)(/|$) {
            limit_req zone=auth_limit burst=20;
            limit_conn addr_limit 10;
            proxy_pass http://auth_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(auth|users|roles|permissions)(/|$) {
            limit_req zone=auth_limit burst=20;
            limit_conn addr_limit 10;
            rewrite ^/(.*)$ /api/v1/$1 break;
            proxy_pass http://auth_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/notifications(/|$) {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            rewrite ^/(.*)$ /api/v1/$1 break;
            proxy_pass http://notification_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(academic-years|attendance|classrooms|courses|curricula|departments|enrollments|faculties|grades|schedules|sections|semesters|waitlist)(/|$) {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            rewrite ^/(.*)$ /api/v1/$1 break;
            proxy_pass http://academic_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(announcements|support-tickets)(/|$) {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            rewrite ^/(.*)$ /api/v1/$1 break;
            proxy_pass http://engagement_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(lecturers|students)(/|$) {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            rewrite ^/(.*)$ /api/v1/$1 break;
            proxy_pass http://people_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/analytics(/|$) {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            rewrite ^/(.*)$ /api/v1/$1 break;
            proxy_pass http://analytics_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/finance(/|$) {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            rewrite ^/(.*)$ /api/v1/$1 break;
            proxy_pass http://finance_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /socket.io/ {
            proxy_pass http://notification_service_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/ {
            limit_req zone=api_limit burst=60;
            limit_conn addr_limit 10;
            proxy_pass http://core_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /uploads/ {
            proxy_pass http://core_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=general_limit burst=120;
            limit_conn addr_limit 10;
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
