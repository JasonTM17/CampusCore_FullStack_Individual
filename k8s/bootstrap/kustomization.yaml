apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: campuscore

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: campuscore

resources:
  - 01-core-api-init.yaml
  - 02-auth-service-init.yaml
  - 03-notification-service-init.yaml
  - 04-finance-service-init.yaml
  - 05-academic-service-init.yaml
  - 06-engagement-service-init.yaml
  - 07-people-service-init.yaml
  - 08-analytics-service-init.yaml

images:
  - name: campuscore-backend
    newName: ghcr.io/jasontm17/campuscore-backend
    newTag: v1.4.0
  - name: campuscore-auth-service
    newName: ghcr.io/jasontm17/campuscore-auth-service
    newTag: v1.4.0
  - name: campuscore-notification-service
    newName: ghcr.io/jasontm17/campuscore-notification-service
    newTag: v1.4.0
  - name: campuscore-finance-service
    newName: ghcr.io/jasontm17/campuscore-finance-service
    newTag: v1.4.0
  - name: campuscore-academic-service
    newName: ghcr.io/jasontm17/campuscore-academic-service
    newTag: v1.4.0
  - name: campuscore-engagement-service
    newName: ghcr.io/jasontm17/campuscore-engagement-service
    newTag: v1.4.0
  - name: campuscore-people-service
    newName: ghcr.io/jasontm17/campuscore-people-service
    newTag: v1.4.0
  - name: campuscore-analytics-service
    newName: ghcr.io/jasontm17/campuscore-analytics-service
    newTag: v1.4.0
