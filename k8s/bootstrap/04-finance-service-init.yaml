apiVersion: batch/v1
kind: Job
metadata:
  name: finance-service-init
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: finance-service-init
          image: campuscore-finance-service
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - ./node_modules/.bin/prisma db push --schema prisma/schema.prisma --skip-generate && node dist/prisma/migrate-legacy-finance.js
          envFrom:
            - configMapRef:
                name: campuscore-shared-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: POSTGRES_PASSWORD
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: RABBITMQ_PASSWORD
            - name: DATABASE_URL
              value: postgresql://campuscore:$(POSTGRES_PASSWORD)@postgres:5432/campuscore?schema=finance
            - name: RABBITMQ_URL
              value: amqp://campuscore:$(RABBITMQ_PASSWORD)@rabbitmq:5672
            - name: CORE_API_INTERNAL_URL
              value: http://core-api:4000
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: JWT_SECRET
            - name: HEALTH_READINESS_KEY
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: HEALTH_READINESS_KEY
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: INTERNAL_SERVICE_TOKEN
