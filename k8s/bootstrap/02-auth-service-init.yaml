apiVersion: batch/v1
kind: Job
metadata:
  name: auth-service-init
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: auth-service-init
          image: campuscore-auth-service
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - ./node_modules/.bin/prisma db push --schema prisma/schema.prisma --skip-generate && node dist/prisma/migrate-legacy-auth.js
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://campuscore:$(POSTGRES_PASSWORD)@postgres:5432/campuscore?schema=auth
