apiVersion: batch/v1
kind: Job
metadata:
  name: core-api-init
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: core-api-init
          image: campuscore-backend
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -lc
            - ./node_modules/.bin/prisma db push --schema prisma/schema.prisma --skip-generate && node -e 'const bcrypt = require("bcrypt"); bcrypt.default = bcrypt; require("./dist/prisma/seed.js")'
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: campuscore-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://campuscore:$(POSTGRES_PASSWORD)@postgres:5432/campuscore?schema=public
