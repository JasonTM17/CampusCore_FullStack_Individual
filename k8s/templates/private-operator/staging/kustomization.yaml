apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: campuscore-staging

resources:
  - ../../../overlays/staging-operator

patches:
  - path: patch-configmap.yaml
    target:
      kind: ConfigMap
      name: campuscore-shared-env
  - path: patch-ingress.yaml
    target:
      kind: Ingress
      name: campuscore
  - path: patch-external-secret.yaml
    target:
      kind: ExternalSecret
      name: campuscore-secrets
  - path: patch-certificate.yaml
    target:
      kind: Certificate
      name: campuscore-tls
  - path: patch-runtime-overrides.yaml

