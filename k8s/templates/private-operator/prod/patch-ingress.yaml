apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: campuscore
  annotations:
    replace-with-private-ingress-annotation-key.example.com/name: replace-with-private-ingress-annotation-value
    external-dns.alpha.kubernetes.io/hostname: replace-with-real-prod-host.example.com
spec:
  ingressClassName: replace-with-prod-ingress-class
  tls:
    - hosts:
        - replace-with-real-prod-host.example.com
      secretName: replace-with-real-prod-tls-secret
  rules:
    - host: replace-with-real-prod-host.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: campuscore-nginx
                port:
                  number: 80

